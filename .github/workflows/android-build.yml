name: Build Android APK
on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Capacitor Core & Plugins
        # Erstellt die notwendige Umgebung für die Android-App
        run: |
          npm init -y
          npm install @capacitor/core@latest @capacitor/android@latest @capacitor/preferences@latest

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Build APK
        working-directory: ./android
        run: |
          # Wir ignorieren die beschädigte gradlew-Datei komplett
          # Wir nutzen direkt 'gradle' vom System
          gradle assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: sethic-app
          path: "**/*.apk"
