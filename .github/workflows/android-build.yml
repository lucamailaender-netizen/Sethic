name: Build Android APK
on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Build APK
        run: |
          # Sucht die gradlew Datei im gesamten Repo
          GRADLEW_PATH=$(find . -name gradlew | head -n 1)
          
          if [ -z "$GRADLEW_PATH" ]; then
            echo "FEHLER: Die Datei 'gradlew' wurde nirgendwo gefunden!"
            echo "Bitte lade dein gesamtes Projekt (inklusive aller Ordner) hoch."
            ls -R
            exit 1
          fi
          
          # Wechselt in das Verzeichnis, wo gradlew liegt
          cd "$(dirname "$GRADLEW_PATH")"
          chmod +x gradlew
          
          # Startet den Build-Vorgang
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: sethic-app
          # Sucht die APK automatisch, egal in welchem Unterordner sie liegt
          path: "**/*.apk"
