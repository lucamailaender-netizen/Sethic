name: Build Android APK
on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Build APK
        run: |
          # Wir suchen den Android-Ordner
          ANDROID_DIR=$(find . -name build.gradle -exec dirname {} + | grep "/android$" | head -n 1)
          
          if [ -z "$ANDROID_DIR" ]; then
            ANDROID_DIR=$(find . -name build.gradle -exec dirname {} + | head -n 1)
          fi

          if [ -z "$ANDROID_DIR" ]; then
            echo "FEHLER: Kein Android-Projekt (build.gradle) gefunden!"
            exit 1
          fi

          cd "$ANDROID_DIR"
          # Wir nutzen 'gradle' direkt vom System statt './gradlew'
          gradle assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: sethic-app
          path: "**/*.apk"
